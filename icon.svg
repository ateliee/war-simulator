<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128">
  <defs>
    <radialGradient id="bgGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#2b0000"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" fill="url(#bgGrad)"/>
  <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif" font-size="48" fill="#ffcc00"
        filter="url(#glow)" >WAR</text>
</svg>
