name: "Deploy to GitHub Pages"

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  export-web:
    name: Web Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true
          
      - name: Setup Godot Export Templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/4.2.2.stable ~/.local/share/godot/export_templates/4.2.2.stable
          
      - name: Web Build
        run: |
          mkdir -v -p build/web
          godot --headless --export-release "Web" output/web/index.html
          
      - name: Add coi-serviceworker (Required for Godot 4 HTML5)
        run: |
          wget https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.js -O output/web/coi-serviceworker.js
          sed -i 's#<head>#<head><script src="coi-serviceworker.js"></script>#g' output/web/index.html
          
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: output/web

  deploy-page:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: export-web
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
