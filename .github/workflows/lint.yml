name: "GDScript Lint & Format"

on:
  push:
    paths:
      - '**.gd'
  pull_request:
    paths:
      - '**.gd'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Run gdlint and gdformat
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install gdtoolkit
        run: pip install gdtoolkit
        
      - name: Check formatting (gdformat)
        run: gdformat --check .
        
      - name: Check linting (gdlint)
        run: gdlint .
