name: "Deploy to GitHub Pages"
env:
  GODOT_VERSION: "4.6.1"

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  export-web:
    name: Web Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.1
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          lfs: true
          
      - name: Setup Godot Export Templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          
      - name: Web Build
        run: |
          mkdir -v -p build/web
          godot --headless --export-release "Web" output/web/index.html
          
      - name: Add coi-serviceworker (Required for Godot 4 HTML5)
        run: |
          wget https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.js -O output/web/coi-serviceworker.js
          sed -i 's#<head>#<head><script src="coi-serviceworker.js"></script>#g' output/web/index.html
          
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: output/web

  deploy-page:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: export-web
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: deploy-page
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        
      - name: Generate Tag
        id: tag
        run: |
          # JST(日本時間)での日付をベースにしたタグ名を作成（例: v2026.06.08-abc1234）
          TZ="Asia/Tokyo" echo "tag_name=v$(date +'%Y.%m.%d')-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          
      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: "Release ${{ steps.tag.outputs.tag_name }}"
          generate_release_notes: true
          body: "GitHub Pages へのデプロイに伴う自動リリースです。"
